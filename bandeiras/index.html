<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>bandeiras</title>
        <link rel="stylesheet" href="./index.css">
    </head>
    <body>
        <div id="baideira-1">
            <div id="bandeira-rusia" class="bandeira-vertical">
                <div class="cor-branca"></div>
                <div class="cor-azul"></div>
                <div class="cor-vermelha"></div>
            </div>
            <div id="bandeira-franca" class="bandeira-horizontal">
                <div class="cor-azul"></div>
                <div class="cor-branca"></div>
                <div class="cor-vermelha"></div>
            </div>
            <div id="bandeira-japao" class="cor-branca">
                <div class="cor-vermelha"></div>
            </div>
        </div>

        <div id="bandeia-2">
            <div id="bandeira-alemanha" class="bandeira-vertical">
                <div class="cor-preta"></div>
                <div class="cor-amarela"></div>
                <div class="cor-vermelha"></div>
            </div>
            <div id="bandeira-belgica" class="bandeira-horizontal">
                <div class="cor-preta"></div>
                <div class="cor-amarela"></div>
                <div class="cor-vermelha"></div>
            </div>
            <div id="bandeira-brasil" class="cor-verde">
                <div class="cor-amarela"><div class="cor-azul"></div></div>
            </div>
            <div id="bandeira-italia" class="bandeira-horizontal">
                <div class="cor-verde"></div>
                <div class="cor-branca"></div>
                <div class="cor-vermelha"></div>
            </div>
        </div>
    </body>
</html>
