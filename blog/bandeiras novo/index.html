
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlagBlog Pro | Versão Estável</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Flag<span>Blog</span></h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Pesquisar país...">
            <p id="counter"></p>
        </div>
    </header>

    <main class="flag-grid" id="flagGrid"></main>

    <div id="flagModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
